name: Generate and Deploy RSS Feed

on:
  schedule:
    # Runs every day at midnight UTC (09:00 JST)
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual triggering

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to commit to gh-pages branch and save cache

    steps:
      - name: Checkout repository
        # Checks out the default branch (master/main)
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Use cache action for the previous ISBN list
      - name: Cache previous ISBN list
        id: cache-isbns # Give the step an ID
        uses: actions/cache@v4
        with:
          path: isbns_previous.json # File to cache
          # Key based on OS and a static string - ensures consistency
          # Change 'v1' if cache structure changes significantly
          key: ${{ runner.os }}-isbns-v1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests feedgen pytz

      - name: Generate RSS Feed (Differential Update)
        # This script now handles the logic of using/saving isbns_previous.json
        run: python generate_feed.py

      - name: Deploy to GitHub Pages
        # Deploy only if the feed file actually exists and is not empty
        # This prevents empty commits if the script fails or finds no matching books
        if: success() && hashFiles('feed.xml') != '' && ! ( test $(find feed.xml -type f -size 0c -print -quit) )
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Specify the directory containing feed.xml
          publish_dir: ./
          # Only include feed.xml in the deployment, exclude others like isbns_previous.json
          # The action defaults should handle this correctly by using the content of publish_dir
          # but explicitly setting exclude_assets might be safer if needed.
          # exclude_assets: 'isbns_previous.json' # Example if needed
          publish_branch: gh-pages # Deploy to this branch
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Update feed.xml [skip ci]' # Add [skip ci] to prevent triggering other workflows
          # Keep existing files on gh-pages? Defaults to false (clean deploy)
          # If feed.xml is the only intended file, cleaning is usually best.
          # keep_files: false
          # Allow empty commits? No, we check if feed.xml exists.
          allow_empty_commit: false