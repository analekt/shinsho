name: Generate and Deploy RSS Feed

on:
  schedule:
    # Runs every day at midnight UTC (09:00 JST)
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual triggering

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to commit to gh-pages branch

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Specify desired Python version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests feedgen pytz

      - name: Generate RSS Feed
        run: python generate_feed.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./  # Directory containing feed.xml (root in this case)
          publish_branch: gh-pages # Branch to deploy to
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Update feed.xml'
          # Optional: uncomment to keep other files in gh-pages branch
          # keep_files: true
          # Optional: uncomment to create a new commit history each time
          # force_orphan: true 