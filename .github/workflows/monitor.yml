name: OpenBD Cコード監視

on:
  schedule:
    # 毎日UTC 15:00 (JST 00:00) に実行
    - cron: '0 15 * * *'
  workflow_dispatch:  # 手動実行も可能
  push:
    branches: [ master ]  # プッシュ時もテスト実行

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
    - name: チェックアウト
      uses: actions/checkout@v4
      
    - name: Python環境セットアップ
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: 依存関係インストール
      run: |
        python -m pip install --upgrade pip
        pip install requests
        
    - name: データベースファイルの復元
      uses: actions/cache@v3
      with:
        path: openbd_books.db
        key: openbd-db-${{ github.sha }}
        restore-keys: |
          openbd-db-
          
    - name: Cコード監視実行
      run: python openbd_monitor.py
      timeout-minutes: 30
      
    - name: RSSフィードをコミット
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add index.xml openbd_books.db
        git diff --staged --quiet || git commit -m "RSSフィード更新: $(date '+%Y-%m-%d %H:%M:%S')"
        
    - name: 変更をプッシュ
      uses: ad-m/github-push-action@master
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        branch: ${{ github.ref }}